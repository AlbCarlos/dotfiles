
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# monitor=HDMI-A-1,preferred,auto,auto
# monitor=DP-2,preferred,auto,auto
source = ~/.config/hypr/monitors.conf


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# System services and daemons
exec-once = waybar & swaync & hypridle & hyprpaper

# Special workspace apps (silent = open in background without stealing focus)
exec-once = [workspace special:spotify silent] spotify
exec-once = [workspace special:whatsapp silent] brave --app=https://web.whatsapp.com/ --profile-directory=Default
exec-once = [workspace special:keepass silent] keepassxc
exec-once = [workspace special:mail silent] brave --app=https://mail.google.com/ --profile-directory=Default
exec-once = [workspace special:xournal silent] xournalpp
exec-once = [workspace special:files silent] nautilus


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.95
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, Shift Open
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,latam
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = ALT # Sets "ALT" key as main modifier

# ┌─────────────────────────────────────────────────────────┐
# │ APPLICATION LAUNCHERS                                    │
# └─────────────────────────────────────────────────────────┘

bind = $mainMod SHIFT, comma, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, b, exec, brave

# ┌─────────────────────────────────────────────────────────┐
# │ WINDOW MANAGEMENT                                       │
# └─────────────────────────────────────────────────────────┘

bind = $mainMod, Q, killactive,
bind = $mainMod CTRL, Q, exec, hyprlock
bind = $mainMod, F10, exec, swaync-client -d -sw && sleep 0.1 && swaync-client -t -sw  # Toggle DND

# ┌─────────────────────────────────────────────────────────┐
# │ FOCUS MOVEMENT                                          │
# └─────────────────────────────────────────────────────────┘

# Move focus with SUPER_L (Windows key) + hjkl keys
bind = SUPER_L, h, movefocus, l
bind = SUPER_L, j, movefocus, d
bind = SUPER_L, k, movefocus, u
bind = SUPER_L, l, movefocus, r

# ┌─────────────────────────────────────────────────────────┐
# │ WORKSPACE NAVIGATION                                    │
# └─────────────────────────────────────────────────────────┘

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ┌─────────────────────────────────────────────────────────┐
# │ SPECIAL WORKSPACES                                      │
# └─────────────────────────────────────────────────────────┘

# Toggle special workspaces ($mainMod SHIFT + mnemonic letter)
bind = $mainMod SHIFT, a, togglespecialworkspace, spotify
bind = $mainMod SHIFT, w, togglespecialworkspace, whatsapp
bind = $mainMod SHIFT, k, togglespecialworkspace, keepass
bind = $mainMod SHIFT, b, togglespecialworkspace, obs
bind = $mainMod SHIFT, m, togglespecialworkspace, mail
bind = $mainMod SHIFT, d, togglespecialworkspace, xournal
bind = $mainMod SHIFT, e, togglespecialworkspace, files

# ┌─────────────────────────────────────────────────────────┐
# │ OS-X LIKE SHORTCUTS (Clipboard & Edit)                 │
# └─────────────────────────────────────────────────────────┘

bind = $mainMod, c, sendshortcut, CTRL, c, activewindow  # Copy
bind = $mainMod, v, sendshortcut, CTRL, v, activewindow  # Paste
bind = $mainMod SHIFT, v, sendshortcut, CTRL SHIFT, v, activewindow  # Paste without formatting
bind = $mainMod, x, sendshortcut, CTRL, x, activewindow  # Cut
bind = $mainMod, a, sendshortcut, CTRL, a, activewindow  # Select all
bind = $mainMod, z, sendshortcut, CTRL, z, activewinow   # Undo
bind = $mainMod, s, sendshortcut, CTRL, s, activewindow   # Save
bind = $mainMod, o, sendshortcut, CTRL, o, activewindow  # Open
bind = $mainMod SHIFT, o, sendshortcut, CTRL SHIFT, o, activewindow  # Shift Open
bind = $mainMod, n, sendshortcut, CTRL, n, activewindow   # New
bind = $mainMod, w, sendshortcut, CTRL, w, activewindow   # Close tab/window
bind = $mainMod, f, sendshortcut, CTRL, f, activewindow   # Find
bind = $mainMod, k, sendshortcut, CTRL, k, activewindow   # search/special 
bind = $mainMod, t, sendshortcut, CTRL, t, activewindow   # New tab
bind = $mainMod, r, sendshortcut, CTRL, r, activewindow   # Refresh
bind = $mainMod SHIFT, r, sendshortcut, CTRL SHIFT, r, activewindow   # Hard reload
bind = $mainMod, u, sendshortcut, CTRL, u, activewindow   # Undo
bind = $mainMod, y, sendshortcut, CTRL, y, activewindow   # Redo
bind = $mainMod, enter, sendshortcut, CTRL, enter, activewindow   # Enter
bind = $mainMod SHIFT, t, sendshortcut, CTRL SHIFT, t, activewindow  # Reopen closed tab
bind = $mainMod, l, sendshortcut, CTRL, l, activewindow   # Focus address bar
bind = $mainMod, backspace, sendshortcut, CTRL SHIFT, backspace, activewindow  # Delete word
bind = SUPER_L, backspace, sendshortcut, CTRL, backspace, activewindow  # Delete character

# ┌─────────────────────────────────────────────────────────┐
# │ TEXT NAVIGATION SHORTCUTS                               │
# └─────────────────────────────────────────────────────────┘

# Tab navigation
bindel = $mainMod SHIFT, bracketleft, sendshortcut, CTRL SHIFT, Tab, activewindow   # Previous tab
bindel = $mainMod SHIFT, bracketright, sendshortcut, CTRL, Tab, activewindow        # Next tab

# Arrow key shortcuts
bind = SUPER_L, left, sendshortcut, CTRL, left, activewindow      # Word left
bind = SUPER_L, right, sendshortcut, CTRL, right, activewindow    # Word right
bind = $mainMod, up, sendshortcut, CTRL, up, activewindow          # Scroll up
bind = $mainMod, down, sendshortcut, CTRL, down, activewindow      # Scroll down
bind = $mainMod, left, sendshortcut, ,HOME, activewindow           # Home
bind = $mainMod, right, sendshortcut, ,END, activewindow          # End

# Selection shortcuts
bind = $mainMod SHIFT, left, sendshortcut, SHIFT, home, activewindow              # Select to home
bind = $mainMod SHIFT, right, sendshortcut, SHIFT, end, activewindow              # Select to end
bind = SUPER_L SHIFT, left, sendshortcut, CTRL SHIFT, left, activewindow          # Select word left
bind = SUPER_L SHIFT, right, sendshortcut, CTRL SHIFT, right, activewindow        # Select word right
bind = $mainMod SHIFT, up, sendshortcut, CTRL SHIFT, up, activewindow             # Select line up
bind = $mainMod SHIFT, down, sendshortcut, CTRL SHIFT, down, activewindow         # Select line down

# ┌─────────────────────────────────────────────────────────┐
# │ MOUSE BINDINGS                                          │
# └─────────────────────────────────────────────────────────┘

bind = $mainMod, mouse:272, sendshortcut, CTRL, mouse:272, activewindow  # Middle click
bindm = CTRL, mouse:272, movewindow  # Move window with CTRL + drag

# ┌─────────────────────────────────────────────────────────┐
# │ MEDIA KEYS                                              │
# └─────────────────────────────────────────────────────────┘

# Volume control
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media playback (requires playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ┌─────────────────────────────────────────────────────────┐
# │ SCREENSHOTS                                             │
# └─────────────────────────────────────────────────────────┘

bind = , PRINT, exec, hyprshot -m region -o ~/Pictures/screenshots
bind = SHIFT, PRINT, exec, hyprshot -m region --clipboard


##############################
### WINDOWS AND WORKSPACES ###
##############################


# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# ┌─────────────────────────────────────────────────────────┐
# │ GENERAL WINDOW RULES                                    │
# └─────────────────────────────────────────────────────────┘

# Ignore maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# ┌─────────────────────────────────────────────────────────┐
# │ SPECIAL WORKSPACE WINDOW RULES                         │
# └─────────────────────────────────────────────────────────┘

# Keep apps bound to their special workspaces on re-launch
windowrule = workspace special:spotify, class:^(spotify)$
windowrule = workspace special:whatsapp, class:^(brave-web\.whatsapp\.com__-Default)$
windowrule = workspace special:keepass, class:^(org\.keepassxc\.KeePassXC)$
windowrule = workspace special:obs, class:^(com\.obsproject\.Studio)$
windowrule = workspace special:mail, class:^(brave-mail\.google\.com__-Default)$
windowrule = workspace special:xournal, class:^(com\.github\.xournalpp\.xournalpp)$
windowrule = workspace special:files, class:^(org\.gnome\.Nautilus)$
