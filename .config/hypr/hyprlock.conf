# -----------------------------------------------------
# Hyprlock Configuration
# Theme: Tokyo Night
# -----------------------------------------------------

# -----------------------------------------------------
# TOKYO NIGHT COLOR PALETTE
# -----------------------------------------------------
$fg = rgb(c0caf5)
$bg = rgb(1a1b26)
$blue = rgb(7aa2f7)
$cyan = rgb(7dcfff)
$magenta = rgb(bb9af7)
$terminal_black = rgb(414868)

# You can comment out the pywal source if you want a static
# theme defined entirely by this file.
source = ~/.config/hypr/tokyo-night-theme.conf

# -----------------------------------------------------
# BACKGROUND
# -----------------------------------------------------
background {
    monitor =
    path = $HOME/.config/backgrounds/ubuntu-bg.jpg
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# -----------------------------------------------------
# GENERAL
# -----------------------------------------------------
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# -----------------------------------------------------
# INPUT FIELD
# -----------------------------------------------------
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $blue
    inner_color = $terminal_black
    font_color = $cyan
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    placeholder_text =<i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# -----------------------------------------------------
# TIME LABEL
# -----------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = $cyan
    font_size = 120
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -300
    halign = center
    valign = top
}

# -----------------------------------------------------
# DATE LABEL
# -----------------------------------------------------
label {
    monitor =
    # The command below gets the full day name, full month name, day number, and year.
    text = cmd[update:1000] echo "$(date +"%A, %B %d, %Y")"
    color = $cyan
    font_size = 28
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, -200  # Positioned below the time label
    halign = center
    valign = top
}

# -----------------------------------------------------
# USER LABEL
# -----------------------------------------------------
label {
    monitor =
    text = Welcome back, $USER
    color = $cyan
    font_size = 25
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, -40
    halign = center
    valign = center
}
